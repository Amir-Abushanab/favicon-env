name: Deploy demo to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; let a newer one supersede an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4 # reads the pinned pnpm from package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      # Mirror the repo layout so the demo's `../dist/index.js` import resolves:
      #   /            → redirects to /examples/
      #   /examples/   → the demo (imports ../dist → /dist)
      #   /dist/       → the freshly built package
      - name: Assemble site
        run: |
          mkdir -p _site/dist _site/examples
          cp -r dist/. _site/dist/
          cp examples/index.html _site/examples/index.html
          printf '<!doctype html><meta http-equiv="refresh" content="0; url=./examples/">\n' > _site/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deploy
        uses: actions/deploy-pages@v4
