name: Release

# Runs only after Test succeeds on a push to main, so a release is never cut from a
# red commit. Pending changesets open the "Version Packages" PR; merging it publishes
# to npm via OIDC trusted publishing (provenance, no NPM_TOKEN) and pushes the tag.
# The npm trusted publisher is configured against this filename (release.yml).
on:
  workflow_run:
    workflows: [Test]
    types: [completed]
    branches: [main]

concurrency: ${{ github.workflow }}

permissions:
  contents: write # version-bump commit + release tag
  pull-requests: write # the Version Packages PR
  id-token: write # OIDC trusted publishing + provenance

jobs:
  release:
    # Only a successful, push-triggered Test run (PR runs are filtered by `branches`).
    if: ${{ github.event.workflow_run.event == 'push' && github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24 # OIDC needs Node > 22; its bundled npm supports OIDC
          cache: pnpm
      # Don't add `npm i -g npm@latest`: npm 12 breaks changesets 2.31.0's
      # already-published detection and crashes no-op releases.
      - run: pnpm install --frozen-lockfile

      # Skip when there's nothing new: changesets 2.31.0 crashes (rather than no-op'ing)
      # if it re-publishes an already-live version.
      - name: Is there anything to release?
        id: rel
        run: |
          if ls .changeset/*.md 2>/dev/null | grep -qv '/README\.md$'; then
            echo "run=true" >> "$GITHUB_OUTPUT"   # pending changesets -> Version PR
          elif node -e "const p=require('./package.json'); fetch('https://registry.npmjs.org/'+p.name+'/'+p.version).then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"; then
            echo "run=false" >> "$GITHUB_OUTPUT"  # already on npm -> nothing to do
          else
            echo "run=true" >> "$GITHUB_OUTPUT"   # new version -> publish
          fi

      - name: Version PR or publish
        if: steps.rel.outputs.run == 'true'
        uses: changesets/action@v1
        with:
          version: pnpm run version
          publish: pnpm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
